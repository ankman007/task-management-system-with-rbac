version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rbac_postgres_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=taskdb
    ports:
      - "5432:5432"  # This maps port 5432 from inside Docker to your local machine
    volumes:
      - postgres_local_data:/var/lib/postgresql/data

volumes:
  postgres_local_data: