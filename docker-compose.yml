version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: task_manager_db
    environment:
      - POSTGRES_USER=admin_user
      - POSTGRES_PASSWORD=super_secret_password
      - POSTGRES_DB=task_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Add a health check so Docker knows when Postgres is ACTUALLY ready to accept connections
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d task_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: task_manager_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: task_manager_api
    environment:
      - DATABASE_URL=postgresql://admin_user:super_secret_password@db:5432/task_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: .
    container_name: task_manager_worker
    environment:
      - DATABASE_URL=postgresql://admin_user:super_secret_password@db:5432/task_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data: